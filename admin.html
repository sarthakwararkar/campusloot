<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — CampusLoot</title>
    <meta
      name="description"
      content="CampusLoot admin dashboard for managing deals, submissions, and users."
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/components.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  </head>
  <body>
    <header id="site-header"></header>

    <div class="container admin-page" id="admin-container">
      <div class="loader-container" id="admin-loader">
        <div class="loader"></div>
      </div>
    </div>

    <footer id="site-footer"></footer>

    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/deals.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/components.js"></script>
    <script>
      (async function initAdminPage() {
        renderHeader("admin");
        renderFooter();

        const user = await requireAdmin();
        if (!user) return;

        const container = document.getElementById("admin-container");
        container.innerHTML = "";

        // Page title
        const title = document.createElement("h1");
        title.textContent = "⚙️ Admin Dashboard";
        title.style.marginBottom = "var(--space-xl)";
        container.appendChild(title);

        // Stats
        await loadStats();
        // Pending Submissions
        await loadPendingSubmissions();
        // Scraped Deals Review Queue
        await loadScrapedDeals();
        // All Deals Management
        await loadAllDeals();

        async function loadStats() {
          const stats = await fetchAdminStats();
          const grid = document.createElement("div");
          grid.className = "admin-stats";
          const statItems = [
            { value: stats.totalDeals, label: "Total Deals", icon: "📦" },
            { value: stats.totalUsers, label: "Total Users", icon: "👥" },
            { value: stats.totalSaves, label: "Total Saves", icon: "❤️" },
            {
              value: stats.pendingSubmissions,
              label: "Pending Reviews",
              icon: "⏳",
            },
          ];
          statItems.forEach((s) => {
            const card = document.createElement("div");
            card.className = "admin-stat-card";
            const num = document.createElement("div");
            num.className = "stat-number";
            num.textContent = `${s.icon} ${s.value}`;
            card.appendChild(num);
            const label = document.createElement("div");
            label.className = "stat-label";
            label.textContent = s.label;
            card.appendChild(label);
            grid.appendChild(card);
          });
          container.appendChild(grid);
        }

        async function loadPendingSubmissions() {
          const section = document.createElement("div");
          section.className = "admin-section";
          const h2 = document.createElement("h2");
          h2.textContent = "📝 Pending Submissions";
          section.appendChild(h2);

          const submissions = await fetchPendingSubmissions();
          if (submissions.length === 0) {
            section.appendChild(
              renderEmptyState(
                "✅",
                "All caught up!",
                "No pending submissions to review.",
              ),
            );
            container.appendChild(section);
            return;
          }

          submissions.forEach((sub) => {
            const card = document.createElement("div");
            card.style.cssText =
              "padding:var(--space-lg);border:1px solid var(--border-light);border-radius:var(--radius-md);margin-bottom:var(--space-md);";

            const top = document.createElement("div");
            top.style.cssText =
              "display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:var(--space-md);";

            const info = document.createElement("div");
            const titleEl = document.createElement("h3");
            titleEl.style.fontSize = "var(--fs-base)";
            titleEl.textContent = sub.title;
            info.appendChild(titleEl);

            const meta = document.createElement("p");
            meta.style.cssText =
              "font-size:var(--fs-sm);color:var(--text-secondary);margin-top:var(--space-xs);";
            const submitterName =
              sub.users?.full_name || sub.users?.email || "Unknown";
            meta.textContent = `${sub.brand_name || "Unknown Brand"} • ${sub.category || "other"} • by ${submitterName} • ${formatDate(sub.created_at)}`;
            info.appendChild(meta);

            if (sub.description) {
              const desc = document.createElement("p");
              desc.style.cssText =
                "font-size:var(--fs-sm);color:var(--text-secondary);margin-top:var(--space-sm);";
              desc.textContent = sub.description;
              info.appendChild(desc);
            }

            if (sub.deal_url) {
              const url = document.createElement("a");
              url.href = sub.deal_url;
              url.target = "_blank";
              url.className = "btn btn-ghost btn-sm";
              url.style.marginTop = "var(--space-sm)";
              url.textContent = "🔗 View URL";
              info.appendChild(url);
            }

            top.appendChild(info);

            const actions = document.createElement("div");
            actions.className = "admin-actions";

            const approveBtn = document.createElement("button");
            approveBtn.className = "btn btn-success btn-sm";
            approveBtn.textContent = "✓ Approve";
            approveBtn.addEventListener("click", async () => {
              setButtonLoading(approveBtn, true);
              const result = await approveDeal(sub);
              if (result.success) {
                showToast("Deal approved and published!", "success");
                card.remove();
              } else {
                showToast(result.error, "error");
                setButtonLoading(approveBtn, false);
              }
            });
            actions.appendChild(approveBtn);

            const rejectBtn = document.createElement("button");
            rejectBtn.className = "btn btn-danger btn-sm";
            rejectBtn.textContent = "✕ Reject";
            rejectBtn.addEventListener("click", () => {
              // Toggle inline rejection form
              const existingForm = card.querySelector(".reject-form");
              if (existingForm) {
                existingForm.remove();
                return;
              }

              const rejectForm = document.createElement("div");
              rejectForm.className = "reject-form";
              rejectForm.style.cssText = "margin-top: var(--space-md); padding: var(--space-md); background: var(--color-background-secondary); border-radius: var(--radius-md); border: 1px solid var(--border-light);";
              
              rejectForm.innerHTML = `
                <label class="form-label" style="display:block; margin-bottom:var(--space-xs); font-weight:bold; font-size:var(--fs-sm);">Rejection reason (optional)</label>
                <textarea class="form-input" rows="2" placeholder="e.g. Deal is expired, duplicate, incorrect info..." style="width:100%; margin-bottom:var(--space-sm);"></textarea>
                <div style="display:flex; gap: var(--space-sm);">
                  <button class="btn btn-danger btn-sm" id="confirm-reject-btn">Confirm Reject</button>
                  <button class="btn btn-ghost btn-sm" id="cancel-reject-btn">Cancel</button>
                </div>
              `;

              rejectForm.querySelector("#cancel-reject-btn").onclick = () => rejectForm.remove();
              rejectForm.querySelector("#confirm-reject-btn").onclick = async () => {
                const reason = rejectForm.querySelector("textarea").value;
                setButtonLoading(rejectForm.querySelector("#confirm-reject-btn"), true);
                const result = await rejectDeal(sub.id, reason || "");
                if (result.success) {
                  showToast("Submission rejected", "info");
                  card.remove();
                } else {
                  showToast(result.error, "error");
                  setButtonLoading(rejectForm.querySelector("#confirm-reject-btn"), false);
                }
              };

              card.appendChild(rejectForm);
            });
            actions.appendChild(rejectBtn);

            top.appendChild(actions);
            card.appendChild(top);
            section.appendChild(card);
          });

          container.appendChild(section);
        }

        async function loadScrapedDeals() {
          const section = document.createElement("div");
          section.className = "admin-section";
          const h2 = document.createElement("h2");
          h2.textContent = "🤖 Scraped Deals — Needs Review";
          section.appendChild(h2);

          const deals = await fetchScrapedPendingDeals();
          if (deals.length === 0) {
            section.appendChild(
              renderEmptyState(
                "🤖",
                "No scraped deals to review",
                "New deals from the scraper will appear here.",
              ),
            );
            container.appendChild(section);
            return;
          }

          deals.forEach((deal) => {
            const card = document.createElement("div");
            card.style.cssText =
              "padding:var(--space-lg);border:1px solid var(--border-light);border-radius:var(--radius-md);margin-bottom:var(--space-md);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--space-md);";

            const info = document.createElement("div");
            info.style.flex = "1";
            const titleEl = document.createElement("h3");
            titleEl.style.fontSize = "var(--fs-base)";
            titleEl.textContent = deal.title;
            info.appendChild(titleEl);

            const meta = document.createElement("p");
            meta.style.cssText =
              "font-size:var(--fs-sm);color:var(--text-secondary);margin-top:var(--space-xs);";
            meta.textContent = `${deal.brand_name || "Unknown"} • ${deal.category || "other"}`;
            info.appendChild(meta);

            if (deal.source_url) {
              const url = document.createElement("a");
              url.href = deal.source_url;
              url.target = "_blank";
              url.rel = "noopener";
              url.className = "btn btn-ghost btn-sm";
              url.style.marginTop = "var(--space-sm)";
              url.textContent = "🔗 Verify Source";
              info.appendChild(url);
            }

            card.appendChild(info);

            const actions = document.createElement("div");
            actions.className = "admin-actions";

            const approveBtn = document.createElement("button");
            approveBtn.className = "btn btn-success btn-sm";
            approveBtn.textContent = "✓ Approve";
            approveBtn.addEventListener("click", async () => {
              setButtonLoading(approveBtn, true);
              const result = await approveScrapedDeal(deal.id);
              if (result.success) {
                showToast("Scraped deal approved!", "success");
                card.remove();
              } else {
                showToast(result.error || "Failed", "error");
                setButtonLoading(approveBtn, false);
              }
            });
            actions.appendChild(approveBtn);

            const skipBtn = document.createElement("button");
            skipBtn.className = "btn btn-ghost btn-sm";
            skipBtn.textContent = "✕ Skip";
            skipBtn.addEventListener("click", async () => {
              setButtonLoading(skipBtn, true);
              const result = await skipScrapedDeal(deal.id);
              if (result.success) {
                showToast("Deal skipped", "info");
                card.remove();
              } else {
                showToast(result.error || "Failed", "error");
                setButtonLoading(skipBtn, false);
              }
            });
            actions.appendChild(skipBtn);

            card.appendChild(actions);
            section.appendChild(card);
          });

          container.appendChild(section);
        }

        async function loadAllDeals() {
          const section = document.createElement("div");
          section.className = "admin-section";
          const h2 = document.createElement("h2");
          h2.textContent = "📦 All Deals";
          section.appendChild(h2);

          const deals = await fetchAllDealsAdmin();
          if (deals.length === 0) {
            section.appendChild(
              renderEmptyState(
                "📦",
                "No deals yet",
                "Deals will appear here once added.",
              ),
            );
            container.appendChild(section);
            return;
          }

          const tableWrap = document.createElement("div");
          tableWrap.style.overflowX = "auto";

          const table = document.createElement("table");
          table.className = "admin-table";
          table.innerHTML = `
          <thead><tr>
            <th>Title</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Views</th>
            <th>Saves</th>
            <th>Active</th>
            <th>Featured</th>
            <th>Verified</th>
            <th>Actions</th>
          </tr></thead>
          <tbody id="admin-deals-tbody"></tbody>
        `;
          tableWrap.appendChild(table);
          section.appendChild(tableWrap);
          container.appendChild(section);

          const tbody = document.getElementById("admin-deals-tbody");
          deals.forEach((deal) => {
            const tr = document.createElement("tr");

            const tdTitle = document.createElement("td");
            tdTitle.textContent = deal.title;
            tdTitle.style.maxWidth = "200px";
            tdTitle.style.overflow = "hidden";
            tdTitle.style.textOverflow = "ellipsis";
            tdTitle.style.whiteSpace = "nowrap";
            tr.appendChild(tdTitle);

            const tdBrand = document.createElement("td");
            tdBrand.textContent = deal.brand_name;
            tr.appendChild(tdBrand);

            const tdCat = document.createElement("td");
            tdCat.textContent = deal.category;
            tr.appendChild(tdCat);

            const tdViews = document.createElement("td");
            tdViews.textContent = deal.views_count || 0;
            tr.appendChild(tdViews);

            const tdSaves = document.createElement("td");
            tdSaves.textContent = deal.saves_count || 0;
            tr.appendChild(tdSaves);

            // Toggle switches
            ["is_active", "is_featured", "is_verified"].forEach((field) => {
              const td = document.createElement("td");
              const toggle = document.createElement("label");
              toggle.className = "toggle";
              const input = document.createElement("input");
              input.type = "checkbox";
              input.checked = deal[field];
              input.addEventListener("change", async () => {
                const result = await toggleDealStatus(
                  deal.id,
                  field,
                  input.checked,
                );
                if (result.success) {
                  showToast(
                    `Deal ${field.replace("is_", "")} updated`,
                    "success",
                  );
                } else {
                  input.checked = !input.checked;
                  showToast("Failed to update", "error");
                }
              });
              toggle.appendChild(input);
              const slider = document.createElement("span");
              slider.className = "toggle-slider";
              toggle.appendChild(slider);
              td.appendChild(toggle);
              tr.appendChild(td);
            });

            // Actions Column (Edit/Delete)
            const tdActions = document.createElement('td');
            tdActions.style.whiteSpace = 'nowrap';

            // Edit button
            const editBtn = document.createElement('button');
            editBtn.className = 'btn btn-ghost btn-sm';
            editBtn.textContent = '✏️ Edit';
            editBtn.addEventListener('click', () => {
              // Toggle inline edit form
              const existingForm = tr.nextElementSibling?.classList.contains('edit-row') ? tr.nextElementSibling : null;
              if (existingForm) {
                existingForm.remove();
                return;
              }

              const editRow = document.createElement('tr');
              editRow.className = 'edit-row';
              const editTd = document.createElement('td');
              editTd.colSpan = 9;
              editTd.style.padding = 'var(--space-md)';
              editTd.style.background = 'var(--color-background-secondary)';

              editTd.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:var(--space-sm);">
                  <label class="form-label" style="font-weight:bold; font-size:var(--fs-sm);">Edit Title</label>
                  <input type="text" class="form-input" value="${deal.title}" style="width:100%;">
                  <div style="display:flex; gap:var(--space-sm);">
                    <button class="btn btn-primary btn-sm" id="confirm-edit-btn">Save Changes</button>
                    <button class="btn btn-ghost btn-sm" id="cancel-edit-btn">Cancel</button>
                  </div>
                </div>
              `;

              editTd.querySelector('#cancel-edit-btn').onclick = () => editRow.remove();
              editTd.querySelector('#confirm-edit-btn').onclick = async () => {
                const newTitle = editTd.querySelector('input').value;
                if (!newTitle || newTitle === deal.title) {
                  editRow.remove();
                  return;
                }
                setButtonLoading(editTd.querySelector('#confirm-edit-btn'), true);
                const result = await updateDeal(deal.id, { title: newTitle });
                if (result.success) {
                  showToast('Deal title updated', 'success');
                  tdTitle.textContent = newTitle;
                  deal.title = newTitle;
                  editRow.remove();
                } else {
                  showToast('Failed to update', 'error');
                  setButtonLoading(editTd.querySelector('#confirm-edit-btn'), false);
                }
              };

              editRow.appendChild(editTd);
              tr.after(editRow);
            });
            tdActions.appendChild(editBtn);

            // Delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn btn-danger btn-sm';
            deleteBtn.textContent = '🗑 Delete';
            deleteBtn.style.marginLeft = 'var(--space-xs)';
            deleteBtn.addEventListener('click', async () => {
               // Inline confirmation
               if (deleteBtn.textContent === '🗑 Confirm?') {
                  setButtonLoading(deleteBtn, true);
                  const result = await deleteDeal(deal.id);
                  if (result.success) {
                    showToast('Deal deleted', 'success');
                    tr.remove();
                    // Also remove edit row if present
                    if (tr.nextElementSibling?.classList.contains('edit-row')) tr.nextElementSibling.remove();
                  } else {
                    showToast('Failed to delete', 'error');
                    deleteBtn.textContent = '🗑 Delete';
                    setButtonLoading(deleteBtn, false);
                  }
                  return;
               }

               deleteBtn.textContent = '🗑 Confirm?';
               setTimeout(() => {
                 if (deleteBtn.textContent === '🗑 Confirm?') deleteBtn.textContent = '🗑 Delete';
               }, 3000);
            });
            tdActions.appendChild(deleteBtn);

            tr.appendChild(tdActions);

            tbody.appendChild(tr);
          });
        }
      })();
    </script>
  </body>
</html>
