<body class="bg-black text-white">
    <!-- Star Background Canvas (Injected via JS) -->
    <header id="site-header"></header>
    <main class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row gap-12">
      <!-- Persistent Glassmorphic Filter Sidebar -->
      <aside class="w-full md:w-64 flex-shrink-0">
        <div class="sticky top-28 bg-white/12 backdrop-blur-2xl rounded-2xl p-6 shadow-2xl space-y-8 border border-white/20 transition-all duration-300 hover:border-indigo-400/50">
          <div>
            <h3
              class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-indigo-400 mb-4"
            >
              Categories
            </h3>
            <div class="space-y-2">
              <label
                class="flex items-center gap-3 cursor-pointer group"
               
              >
                <input
                  checked=""
                  class="w-5 h-5 rounded border-white/10 bg-white/5 text-indigo-500 focus:ring-indigo-500/30 transition-all cursor-pointer"
                  type="checkbox"
                />
                <span class="text-sm font-medium text-slate-300 group-hover:text-indigo-400 transition-colors"
                  >All Categories</span
                >
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input
                  class="w-5 h-5 rounded border-white/10 bg-white/5 text-indigo-500 focus:ring-indigo-500/30 transition-all cursor-pointer"
                  type="checkbox"
                />
                <span class="text-sm font-medium text-slate-400 group-hover:text-indigo-400 transition-colors">Tech &amp; Gadgets</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input
                  class="w-5 h-5 rounded border-white/10 bg-white/5 text-indigo-500 focus:ring-indigo-500/30 transition-all cursor-pointer"
                  type="checkbox"
                />
                <span class="text-sm font-medium text-slate-400 group-hover:text-indigo-400 transition-colors">Food &amp; Dining</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input
                  class="w-5 h-5 rounded border-white/10 bg-white/5 text-indigo-500 focus:ring-indigo-500/30 transition-all cursor-pointer"
                  type="checkbox"
                />
                <span class="text-sm font-medium text-slate-400 group-hover:text-indigo-400 transition-colors">Travel &amp; Stays</span>
              </label>
            </div>
          </div>
          <div>
            <h3
              class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-indigo-400 mb-4"
            >
              Price Range
            </h3>
            <div class="flex flex-wrap gap-2">
              <button class="px-4 py-2 rounded-full text-xs font-bold bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 hover:bg-indigo-600/30 transition-all">All Deals</button>
              <button class="px-4 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-400 border border-white/10 hover:bg-white/10 transition-all">20%+</button>
              <button class="px-4 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-400 border border-white/10 hover:bg-white/10 transition-all">50%+</button>
              <button class="px-4 py-2 rounded-full text-xs font-bold bg-white/5 text-slate-400 border border-white/10 hover:bg-white/10 transition-all">BOGO</button>
            </div>
          </div>

              />

      <!-- Deal Cards Grid -->
      <section class="flex-grow">
        <header
          class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6"
        >
          <div>
            <h1 class="text-4xl font-black text-white mb-2">Latest Deals.</h1>
            <p class="text-slate-400 font-medium mb-12 flex items-center gap-2">
              <span class="w-8 h-1 bg-indigo-500 rounded-full"></span>
              Premium offers for the modern scholar
            </p>
          </div>
          <div
            class="flex items-center gap-4 text-sm font-medium text-on-surface-variant"
          >
            <span id="deals-count">Showing 0 deals</span>
            <select
              class="bg-transparent border-none focus:ring-0 text-primary font-bold cursor-pointer"
            >
              <option>Sort by: Newest</option>
              <option>Sort by: Discount %</option>
              <option>Sort by: Popularity</option>
            </select>
          </div>
        </header>
        <div
          id="deals-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"
        ></div>
        <div id="deals-loader" class="hidden flex justify-center py-12 w-full">
          <div
            class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"
          ></div>
        </div>
        <!-- Pagination/Load More -->
        <div class="mt-20 flex flex-col items-center gap-6">
          <button
            id="load-more-btn"
            class="px-12 py-5 bg-white text-on-surface font-bold rounded-2xl shadow-sm hover:shadow-md hover:scale-105 active:scale-95 transition-all duration-300 border border-outline-variant/10"
          >
            Load More Deals
          </button>

        </div>
      </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script src="js/deals.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/star-background.js"></script>
    <script src="js/cookie-consent.js"></script>
    <script>
      (async function initDealsPage() {
        // Initialize header/footer
        renderHeader('explore');
        renderFooter();

        const grid = document.getElementById("deals-grid");
        const loader = document.getElementById("deals-loader");
        const countEl = document.getElementById("deals-count");
        const loadMoreBtn = document.getElementById("load-more-btn");
        const navSearch = document.getElementById("nav-search-input");
        const sortSelect = document.querySelector('select');

        let currentPage = 1;
        let currentCategory = 'all';
        let currentSort = 'newest';
        let currentSearch = '';
        let totalDeals = 0;
        let dealsLoadedCount = 0;
        let user = await getCurrentUser();
        let savedSet = new Set();
        if (user) {
          try { savedSet = await getSavedDealIds(user.id); } catch(e) { console.error(e); }
        }

        async function loadDeals(page = 1, append = false) {
          try {
            if (!append) {
              grid.innerHTML = "";
              dealsLoadedCount = 0;
            }
            if (loader) loader.classList.remove("hidden");
            if (loadMoreBtn) loadMoreBtn.disabled = true;

            const filters = {
              category: currentCategory,
              sort: currentSort,
              search: currentSearch,
              page: page
            };

            if (countEl && !append) countEl.textContent = `Loading deals...`;
            const { deals, total } = await fetchDeals(filters);
            
            if (loader) loader.classList.add("hidden");
            if (loadMoreBtn) loadMoreBtn.disabled = false;

            if (!deals) {
              if (!append) grid.innerHTML = '<p class="text-error col-span-full text-center py-8">Failed to load deals.</p>';
              return;
            }

            totalDeals = total;
            dealsLoadedCount += deals.length;
            currentPage = page;

            if (countEl) countEl.textContent = `Showing ${dealsLoadedCount} of ${totalDeals} deals`;

            if (deals.length === 0 && !append) {
              grid.innerHTML = '<p class="col-span-full text-center py-8 text-on-surface-variant">No deals found matching your criteria.</p>';
            } else {
              deals.forEach((deal) => {
                grid.appendChild(renderDealCard(deal, { savedDeals: savedSet }));
              });
            }

            updatePagination();
            updateLoadMoreVisibility();
          } catch (err) {
            console.error("loadDeals Error:", err);
            loader.classList.add("hidden");
            if (!append) {
              grid.innerHTML = `<div class="col-span-full py-12 text-center text-error">
                <p class="font-bold">Technical glitch in the matrix.</p>
                <p class="text-sm opacity-70">We couldn't load the deals. Please try refreshing.</p>
              </div>`;
            }
          }
        }

        function updatePagination() {
          renderPagination(
            'pagination-container',
            currentPage,
            totalDeals,
            12,
            (newPage) => {
              window.scrollTo({ top: 300, behavior: 'smooth' });
              loadDeals(newPage, false);
            }
          );
        }

        function updateLoadMoreVisibility() {
          if (!loadMoreBtn) return;
          if (dealsLoadedCount >= totalDeals) {
            loadMoreBtn.classList.add('hidden');
          } else {
            loadMoreBtn.classList.remove('hidden');
          }
        }

        if (loadMoreBtn) {
          loadMoreBtn.onclick = () => loadDeals(currentPage + 1, true);
        }

        const categoryCheckboxes = document.querySelectorAll('aside input[type="checkbox"]');
        categoryCheckboxes.forEach((cb, idx) => {
          cb.onchange = () => {
            // Mapping UI categories to database categories
            const categories = ['other', 'software', 'food', 'local']; 
            if (cb.checked) {
              currentCategory = categories[idx] || 'all';
              categoryCheckboxes.forEach(other => { if (other !== cb) other.checked = false; });
            } else {
              currentCategory = 'all';
            }
            loadDeals(1, false);
          };
        });

        // Brand Search In Sidebar
        const brandInput = document.querySelector('aside input[placeholder="e.g. Nike, Apple..."]');
        if (brandInput) {
           brandInput.oninput = debounce(() => {
             currentSearch = brandInput.value.trim();
             loadDeals(1, false);
           }, 500);
        }

        if (sortSelect) {
          sortSelect.onchange = () => {
            const val = sortSelect.value.toLowerCase();
            if (val.includes('newest')) currentSort = 'newest';
            else if (val.includes('discount')) currentSort = 'discount';
            else if (val.includes('popularity')) currentSort = 'most-saved';
            loadDeals(1, false);
          };
        }

        function debounce(func, timeout = 300) {
          let timer;
          return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
          };
        }

        // Initial search from URL
        const urlParams = new URLSearchParams(window.location.search);
        currentSearch = urlParams.get('search') || '';
        if (navSearch && currentSearch) navSearch.value = currentSearch;
        
        loadDeals(1, false);

        // Header Search
        if (navSearch) {
          navSearch.onkeypress = (e) => {
            if (e.key === 'Enter') {
              currentSearch = navSearch.value.trim();
              loadDeals(1, false);
            }
          };
        }
      })();
    </script>
