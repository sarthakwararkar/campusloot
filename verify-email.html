<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email | Campus Loot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-md w-full p-10 rounded-[2.5rem] shadow-2xl text-center space-y-8">
        <div class="w-20 h-20 bg-primary/10 text-primary rounded-3xl flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        
        <div class="space-y-3">
            <h1 class="text-3xl font-bold text-on-surface">Check your inbox</h1>
            <p class="text-on-surface-variant leading-relaxed">
                We've sent a verification link to your university email. Please click it to activate your account.
            </p>
        </div>

        <div class="bg-primary/5 p-4 rounded-2xl text-sm text-primary font-medium">
            Don't see it? Check your spam folder.
        </div>

        <div class="pt-4">
            <a href="login.html" class="inline-block w-full py-4 bg-inverse-surface text-surface rounded-full font-bold hover:bg-primary transition-all active:scale-95">
                Return to Login
            </a>
        </div>
    </div>
</body>
</html>
