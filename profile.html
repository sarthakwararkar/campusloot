<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  

  
  
  
  
  
  
  
  
  
  

  

  
  
  
  
  
  
  
  
  
  

  <title>My Profile | CampusLoot</title>

  <meta name="description" content="Manage your saved student deals and account settings." />
  <meta property="og:title" content="My Profile | CampusLoot" />
  <meta property="og:description" content="Manage your saved student deals and account settings." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://campusloot.com/profile.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="My Profile | CampusLoot" />
  <meta name="twitter:description" content="Manage your saved student deals and account settings." />
  <meta name="twitter:image" content="/og-image.png" />
  <link rel="icon" href="/favicon.ico" />

</head>
<body>
  <header id="site-header"></header>

  <main class="container" style="padding-top: var(--space-xl); padding-bottom: var(--space-3xl);">
    <!-- Profile Header -->
    <section class="profile-hero">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <div class="profile-info">
        <h1 id="profile-name" class="profile-name">Loading...</h1>
        <p id="profile-college-city" class="profile-subtitle">—</p>
        <div class="profile-stats">
          <div class="profile-stat">
            <span id="profile-stats-saved" class="profile-stat-number">0</span>
            <span class="profile-stat-label">Deals Saved</span>
          </div>
          <div class="profile-stat">
            <span id="profile-stats-subs" class="profile-stat-number">0</span>
            <span class="profile-stat-label">Submissions</span>
          </div>
          <div class="profile-stat">
            <span id="profile-stats-since" class="profile-stat-number">—</span>
            <span class="profile-stat-label">Member Since</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab Navigation -->
    <div class="profile-tabs">
      <button class="profile-tab active" data-tab="saved">📌 Saved Deals</button>
      <button class="profile-tab" data-tab="submissions">📝 My Submissions</button>
      <button class="profile-tab" data-tab="settings">⚙️ Settings</button>
    </div>

    <!-- Tab: Saved Deals -->
    <section id="tab-saved" class="tab-content">
      <div id="saved-deals-grid" class="deals-grid"></div>
    </section>

    <!-- Tab: Submissions -->
    <section id="tab-submissions" class="tab-content" style="display:none;">
      <div id="submissions-container" class="profile-card">
        <div class="loader-container"><div class="loader"></div></div>
      </div>
    </section>

    <!-- Tab: Settings -->
    <section id="tab-settings" class="tab-content" style="display:none;">
      <div class="profile-card" style="max-width: 640px;">
        <h3 style="margin-bottom: var(--space-lg); font-size: var(--fs-xl);">Edit Profile</h3>
        <form id="profile-form">
          <div class="form-group">
            <label class="form-label" for="edit-name">Full Name</label>
            <input class="form-input" type="text" id="edit-name" placeholder="Your name">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="edit-college">College</label>
              <input class="form-input" type="text" id="edit-college" placeholder="IIT Bombay">
            </div>
            <div class="form-group">
              <label class="form-label" for="edit-city">City</label>
              <input class="form-input" type="text" id="edit-city" placeholder="Mumbai">
            </div>
          </div>
          <button type="submit" id="save-profile-btn" class="btn btn-primary">Save Changes</button>
        </form>

        <hr style="border: none; border-top: var(--border-light); margin: var(--space-xl) 0;">

        <h3 style="margin-bottom: var(--space-lg); font-size: var(--fs-xl);">Change Password</h3>
        <form id="password-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="new-password">New Password</label>
              <input class="form-input" type="password" id="new-password" placeholder="Min 8 chars">
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-password">Confirm Password</label>
              <input class="form-input" type="password" id="confirm-password" placeholder="Repeat password">
            </div>
          </div>
          <div id="password-error" class="form-error" style="display:none;"></div>
          <button type="submit" id="change-password-btn" class="btn btn-outline">Change Password</button>
        </form>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/deals.js"></script>
  <script src="js/components.js"></script>
  <script>
    (async function initProfilePage() {
      renderHeader('profile');
      renderFooter();

      const user = await requireAuth();
      if (!user) return;

      const profile = await getCurrentProfile();

      // Avatar — initials
      const name = profile?.full_name || user.email.split('@')[0];
      const initials = name.charAt(0).toUpperCase();
      const avatarEl = document.getElementById('profile-avatar');
      avatarEl.textContent = initials;

      // Profile info
      document.getElementById('profile-name').textContent = name;
      document.getElementById('profile-college-city').textContent =
        [profile?.college_name, profile?.city].filter(Boolean).join(' • ') || 'Update your profile below.';

      // Member since
      const since = profile?.created_at || user.created_at;
      if (since) {
        const d = new Date(since);
        document.getElementById('profile-stats-since').textContent =
          d.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
      }

      // ---- Tab Switching ----
      const tabs = document.querySelectorAll('.profile-tab');
      const contents = document.querySelectorAll('.tab-content');

      tabs.forEach(btn => {
        btn.addEventListener('click', () => {
          tabs.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          contents.forEach(c => c.style.display = 'none');
          const target = document.getElementById('tab-' + btn.dataset.tab);
          if (target) target.style.display = 'block';
        });
      });

      // ---- Load Saved Deals ----
      const savedGrid = document.getElementById('saved-deals-grid');
      savedGrid.innerHTML = '';
      savedGrid.appendChild(renderSkeletonCards(3));

      try {
        const savedDeals = await getSavedDeals(user.id);
        savedGrid.innerHTML = '';
        if (savedDeals.length === 0) {
          savedGrid.appendChild(renderEmptyState('📌', 'No saved deals yet', 'Start exploring deals and save your favorites!', { text: 'Explore Deals', href: 'deals.html' }));
        } else {
          const savedIds = new Set(savedDeals.map(d => d.id));
          savedDeals.forEach(deal => {
            savedGrid.appendChild(renderDealCard(deal, { savedDeals: savedIds }));
          });
        }
        document.getElementById('profile-stats-saved').textContent = savedDeals.length;
      } catch (err) {
        console.error('Failed to load saved deals:', err);
        savedGrid.innerHTML = '';
        savedGrid.appendChild(renderEmptyState('⚠️', 'Failed to load', 'Please try refreshing the page.'));
      }

      // ---- Load Submissions ----
      const subContainer = document.getElementById('submissions-container');
      try {
        const submissions = await getUserSubmissions(user.id);
        if (!submissions || submissions.length === 0) {
          subContainer.innerHTML = '';
          subContainer.appendChild(renderEmptyState('📝', 'No submissions yet', 'Found a great student deal? Share it with the community!', { text: 'Submit a Deal', href: 'submit.html' }));
        } else {
          document.getElementById('profile-stats-subs').textContent = submissions.length;
          let html = '<div style="overflow-x:auto;"><table class="profile-table"><thead><tr><th>Title</th><th>Brand</th><th>Status</th><th>Date</th></tr></thead><tbody>';
          submissions.forEach(sub => {
            const statusClass = sub.status === 'approved' ? 'status-approved' : sub.status === 'rejected' ? 'status-rejected' : 'status-pending';
            html += `<tr>
              <td>${escapeHTML(sub.title || '')}</td>
              <td>${escapeHTML(sub.brand_name || '—')}</td>
              <td><span class="status-badge ${statusClass}">${escapeHTML(sub.status || 'pending')}</span></td>
              <td style="color:var(--text-tertiary)">${formatDate(sub.created_at)}</td>
            </tr>`;
          });
          html += '</tbody></table></div>';
          subContainer.innerHTML = html;
        }
      } catch (err) {
        console.error('Failed to load submissions:', err);
        subContainer.innerHTML = '';
        subContainer.appendChild(renderEmptyState('⚠️', 'Failed to load', 'Please try refreshing.'));
      }

      // ---- Settings Forms ----
      document.getElementById('edit-name').value = profile?.full_name || '';
      document.getElementById('edit-college').value = profile?.college_name || '';
      document.getElementById('edit-city').value = profile?.city || '';

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('save-profile-btn');
        btn.textContent = 'Saving...';
        btn.disabled = true;

        const { error } = await updateProfile(user.id, {
          full_name: sanitizeInput(document.getElementById('edit-name').value),
          college_name: sanitizeInput(document.getElementById('edit-college').value),
          city: sanitizeInput(document.getElementById('edit-city').value)
        });

        btn.textContent = 'Save Changes';
        btn.disabled = false;

        if (error) {
          showToast('Failed to update profile.', 'error');
        } else {
          showToast('Profile updated!', 'success');
          document.getElementById('profile-name').textContent = document.getElementById('edit-name').value;
          document.getElementById('profile-college-city').textContent =
            [document.getElementById('edit-college').value, document.getElementById('edit-city').value].filter(Boolean).join(' • ');
        }
      });

      document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPw = document.getElementById('new-password').value;
        const confirmPw = document.getElementById('confirm-password').value;
        const errorEl = document.getElementById('password-error');
        errorEl.style.display = 'none';

        if (newPw !== confirmPw) {
          errorEl.textContent = 'Passwords do not match';
          errorEl.style.display = 'block';
          return;
        }
        const pwCheck = validatePassword(newPw);
        if (!pwCheck.valid) {
          errorEl.textContent = pwCheck.message;
          errorEl.style.display = 'block';
          return;
        }

        const btn = document.getElementById('change-password-btn');
        btn.textContent = 'Changing...';
        btn.disabled = true;

        const { error } = await updatePassword(newPw);
        btn.textContent = 'Change Password';
        btn.disabled = false;

        if (error) {
          errorEl.textContent = error;
          errorEl.style.display = 'block';
        } else {
          showToast('Password changed!', 'success');
          document.getElementById('password-form').reset();
        }
      });
    })();
  </script>

  <!-- Cookie Consent Banner -->
  <script>
    (function() {
      if (!localStorage.getItem('cookieConsent')) {
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#fff;padding:15px;text-align:center;font-family:sans-serif;z-index:9999;display:flex;justify-content:center;align-items:center;gap:15px;flex-wrap:wrap;border-top:1px solid #333;box-shadow:0 -5px 15px rgba(0,0,0,0.2);';
        banner.innerHTML = '<span style="font-size:14px;">We use cookies to improve your experience. See our <a href="privacy.html" style="color:#4a40e0;text-decoration:underline;">Privacy Policy</a>.</span> ' +
          '<div style="display:flex;gap:10px;"><button id="acceptCookies" style="background:#4a40e0;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:14px;">Accept</button> ' +
          '<button id="declineCookies" style="background:transparent;color:#ccc;border:1px solid #ccc;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px;">Decline</button></div>';
        document.body.appendChild(banner);
        document.getElementById('acceptCookies').onclick = function() {
          localStorage.setItem('cookieConsent', 'accepted');
          banner.style.display = 'none';
        };
        document.getElementById('declineCookies').onclick = function() {
          localStorage.setItem('cookieConsent', 'declined');
          banner.style.display = 'none';
        };
      }
    })();
  </script>

</body>
</html>
