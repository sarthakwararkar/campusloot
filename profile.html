<!DOCTYPE html>
<html lang="en">
<head>

  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"

  />

  <title>My Profile | CampusLoot</title>

  <meta name="description" content="Manage your saved student deals and account settings." />

  <meta property="og:description" content="Manage your saved student deals and account settings." />
  <meta property="og:image" content="/assets/images/og-image.png" />
  <meta property="og:url" content="https://campusloot.com/profile.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="My Profile | CampusLoot" />
  <meta name="twitter:description" content="Manage your saved student deals and account settings." />
  <meta name="twitter:image" content="/assets/images/og-image.png" />
  <link rel="icon" href="/assets/metadata/favicon.ico" />

  <style>
    /* Premium Autofill Fix for dark mode */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: white !important;
      -webkit-box-shadow: 0 0 0px 1000px rgba(255,255,255,0.05) inset !important;
      transition: background-color 5000s ease-in-out 0s;
    }
    /* Avatar hover overlay */
    .avatar-wrapper { position: relative; cursor: pointer; }
    .avatar-wrapper:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.5); display: flex; align-items: center;
      justify-content: center; opacity: 0; transition: opacity 0.2s;
    }
    /* Form inputs for dark bg */
    .dark-form-input {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; color: white; font-size: 0.95rem;
      transition: all 0.2s; outline: none;
    }
    .dark-form-input:focus {
      border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .dark-form-input::placeholder { color: rgba(255,255,255,0.3); }
  </style>
  <link rel="preconnect" href="https://ipapi.co" />
  <link rel="preconnect" href="https://thevyutzufzxiorplvya.supabase.co" />
</head>
  <body class="bg-black text-white selection:bg-indigo-500/30 overflow-x-hidden">
  <header id="site-header"></header>

  <main class="max-w-5xl mx-auto px-6 pt-28 pb-20">
    <!-- Profile Header -->
    <section class="bg-white/5 backdrop-blur-2xl rounded-3xl p-8 md:p-10 border border-white/10 shadow-2xl mb-10">
      <div class="flex flex-col md:flex-row items-center gap-8">
        <!-- Avatar with upload -->
        <div class="avatar-wrapper group" id="avatar-wrapper" title="Click to change profile picture">
          <div class="w-24 h-24 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 text-white flex items-center justify-center text-4xl font-black shadow-lg shadow-indigo-500/20" id="profile-avatar">
            ?
          </div>
          <div class="avatar-overlay rounded-full">
            <span class="material-symbols-outlined text-white text-2xl">photo_camera</span>
          </div>
          <input type="file" id="avatar-input" accept="image/*" class="hidden" />
        </div>

        <!-- Profile Info -->
        <div class="flex-1 text-center md:text-left">
          <h1 id="profile-name" class="text-2xl md:text-3xl font-extrabold text-white tracking-tight mb-1">Loading...</h1>
          <p id="profile-email" class="text-slate-400 text-sm mb-1"></p>
          <p id="profile-college-city" class="text-slate-500 text-sm">—</p>
          <div class="flex gap-8 mt-5 justify-center md:justify-start">
            <div class="text-center">
              <span id="profile-stats-saved" class="block text-xl font-bold text-indigo-400">0</span>
              <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Saved</span>
            </div>
            <div class="text-center">
              <span id="profile-stats-subs" class="block text-xl font-bold text-indigo-400">0</span>
              <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Submissions</span>
            </div>
            <div class="text-center">
              <span id="profile-stats-since" class="block text-xl font-bold text-indigo-400">—</span>
              <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Member Since</span>
            </div>
          </div>
        </div>

        <!-- Logout Button -->
        <button id="logout-btn" class="hidden md:flex items-center gap-2 px-5 py-2.5 rounded-full bg-white/5 border border-white/10 text-slate-400 text-sm font-semibold hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/20 transition-all">
          <span class="material-symbols-outlined text-lg">logout</span>
          Sign Out
        </button>
      </div>
    </section>

    <!-- Tab Navigation -->
    <div class="flex gap-3 mb-8 border-b border-white/10 pb-3 overflow-x-auto">
      <button class="profile-tab px-5 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap bg-indigo-600 text-white" data-tab="saved">📌 Saved Deals</button>
      <button class="profile-tab px-5 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap bg-white/5 text-slate-400 hover:bg-white/10" data-tab="submissions">📝 My Submissions</button>
      <a href="settings.html" class="px-5 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap bg-white/5 text-slate-400 hover:bg-white/10 flex items-center gap-2">
        <span>⚙️</span> Settings
      </a>
    </div>

    <!-- Tab: Saved Deals -->
    <section id="tab-saved" class="tab-content">
      <div id="saved-deals-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- Tab: Submissions -->
    <section id="tab-submissions" class="tab-content" style="display:none;">
      <div id="submissions-container" class="bg-white/5 backdrop-blur-xl rounded-2xl p-6 border border-white/10">
        <div class="flex items-center justify-center py-12">
          <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    if (!window.supabase) {
      document.write('<script src="https://unpkg.com/@supabase/supabase-js@2"><\/script>');
    }
  </script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/deals.js"></script>
  <script src="js/components.js"></script>
  <script defer src="js/analytics.js"></script>
  <script defer src="js/star-background.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      renderHeader('profile');
        renderFooter();

        // 1. Get Auth User (Fastest)
        const user = await requireAuth();
        if (!user) return;

        // 2. IMMEDIATE HYDRATION: Show basic info from Auth metadata right away
        const meta = user.user_metadata || {};
        const initialName = meta.full_name || meta.name || user.email.split('@')[0];
        const initialAvatar = meta.avatar_url || meta.picture;

        document.getElementById('profile-name').textContent = initialName;
        document.getElementById('profile-email').textContent = user.email;
        
        const avatarEl = document.getElementById('profile-avatar');
        if (initialAvatar) {
          avatarEl.innerHTML = `<img src="${initialAvatar}" alt="Profile" class="w-24 h-24 rounded-full object-cover" />`;
          avatarEl.classList.remove('bg-gradient-to-br', 'from-indigo-500', 'to-purple-600');
        } else {
          avatarEl.textContent = initialName.charAt(0).toUpperCase();
        }

        // 3. PARALLEL FETCH: Load everything else simultaneously
        const [profile, savedDeals, submissions] = await Promise.all([
          getCurrentProfile(),
          getSavedDeals(user.id).catch(e => { console.error(e); return []; }),
          getUserSubmissions(user.id).catch(e => { console.error(e); return []; })
        ]);

        // 4. SECONDARY HYDRATION: Update with detailed database info
        if (profile) {
          if (profile.full_name) document.getElementById('profile-name').textContent = profile.full_name;
          if (profile.avatar_url) {
             avatarEl.innerHTML = `<img src="${profile.avatar_url}" alt="Profile" class="w-24 h-24 rounded-full object-cover" />`;
             avatarEl.classList.remove('bg-gradient-to-br', 'from-indigo-500', 'to-purple-600');
          }
          document.getElementById('profile-college-city').textContent =
            [profile.college_name, profile.city].filter(Boolean).join(' • ') || 'Welcome to CampusLoot';
        }

        const since = profile?.created_at || user.created_at;
        if (since) {
          const d = new Date(since);
          document.getElementById('profile-stats-since').textContent = d.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
        }

        // 5. RENDER LISTS
        // Saved Deals
        const savedGrid = document.getElementById('saved-deals-grid');
        savedGrid.innerHTML = '';
        if (savedDeals.length === 0) {
          savedGrid.innerHTML = `<div class="col-span-full text-center py-16"><div class="text-5xl mb-4">📌</div><h3 class="text-xl font-bold text-white mb-2">No saved deals yet</h3><a href="deals.html" class="inline-block px-6 py-3 bg-indigo-600 text-white font-bold rounded-full mt-4">Explore Deals</a></div>`;
        } else {
          const savedIds = new Set(savedDeals.map(d => d.id));
          savedDeals.forEach(deal => savedGrid.appendChild(renderDealCard(deal, { savedDeals: savedIds })));
        }
        document.getElementById('profile-stats-saved').textContent = savedDeals.length;

        // Submissions
        const subContainer = document.getElementById('submissions-container');
        if (submissions.length === 0) {
          subContainer.innerHTML = `<div class="text-center py-16"><div class="text-5xl mb-4">📝</div><h3 class="text-xl font-bold text-white mb-2">No submissions yet</h3></div>`;
        } else {
          document.getElementById('profile-stats-subs').textContent = submissions.length;
          let html = `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-white/10"><th class="text-left py-3 px-4 text-slate-500 font-bold">Title</th><th class="text-left py-3 px-4 text-slate-500 font-bold">Status</th></tr></thead><tbody>`;
          submissions.forEach(sub => {
            html += `<tr class="border-b border-white/5 hover:bg-white/5"><td class="py-3 px-4 text-white">${escapeHTML(sub.title)}</td><td class="py-3 px-4"><span class="px-3 py-1 rounded-full text-xs font-bold border border-white/10">${sub.status || 'pending'}</span></td></tr>`;
          });
          html += '</tbody></table></div>';
          subContainer.innerHTML = html;
        }

        // 6. EVENT LISTENERS
        const avatarInput = document.getElementById('avatar-input');
        document.getElementById('avatar-wrapper').onclick = () => avatarInput.click();
        avatarInput.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          showToast('Uploading...', 'info');
          const { url, error } = await uploadAvatar(file, user.id);
          if (error) {
            showToast(error, 'error');
          } else {
            await updateProfile(user.id, { avatar_url: url });
            avatarEl.innerHTML = `<img src="${url}" alt="Profile" class="w-24 h-24 rounded-full object-cover" />`;
            avatarEl.classList.remove('bg-gradient-to-br', 'from-indigo-500', 'to-purple-600');
            showToast('Updated!', 'success');
          }
        };

        const tabs = document.querySelectorAll('.profile-tab');
        const contents = document.querySelectorAll('.tab-content');
        tabs.forEach(btn => {
          btn.addEventListener('click', () => {
            tabs.forEach(b => b.classList.replace('bg-indigo-600', 'bg-white/5'));
            tabs.forEach(b => b.classList.replace('text-white', 'text-slate-400'));
            btn.classList.replace('bg-white/5', 'bg-indigo-600');
            btn.classList.replace('text-slate-400', 'text-white');
            contents.forEach(c => c.style.display = 'none');
            const target = document.getElementById('tab-' + btn.dataset.tab);
            if (target) target.style.display = 'block';
          });
        });

        document.getElementById('logout-btn').onclick = async () => { await signOut(); window.location.href = 'login.html'; };
      });
  </script>
    <div id="floating-nav"></div>
    <!-- Cookie consent loaded via js/cookie-consent.js -->
</body>
</html>
