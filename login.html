<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CampusLoot</title>
  <meta name="description" content="Login or sign up to CampusLoot. Save deals, submit offers, and join India's student deals community.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <header id="site-header"></header>

  <div class="auth-page">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:var(--space-xl);">
        <a href="index" class="logo" style="justify-content:center;font-size:var(--fs-2xl);">🎓 Campus<span>Loot</span></a>
        <p style="color:var(--text-secondary);margin-top:var(--space-sm);font-size:var(--fs-sm);">Student Deals & Freebies</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" data-tab="login">Login</button>
        <button class="auth-tab" id="tab-signup" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@college.edu" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div id="login-error" class="form-error" style="display:none;margin-bottom:var(--space-md);"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">Login</button>
        <div style="text-align:center;margin-top:var(--space-md);">
          <a href="#" id="forgot-password-link" style="font-size:var(--fs-sm);color:var(--text-secondary);">Forgot password?</a>
        </div>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" style="display:none;">
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email</label>
          <input type="email" id="signup-email" class="form-input" placeholder="you@college.edu" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="Min 8 chars, letter + number" required>
          <div class="form-hint">Minimum 8 characters with at least one letter and one number</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-college">College Name</label>
          <input type="text" id="signup-college" class="form-input" placeholder="Your college name">
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-city">City</label>
          <input type="text" id="signup-city" class="form-input" placeholder="Your city">
        </div>
        <div id="signup-error" class="form-error" style="display:none;margin-bottom:var(--space-md);"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="signup-btn">Create Account</button>
      </form>

      <div class="form-divider">or</div>

      <button class="btn btn-google btn-full btn-lg" id="google-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <!-- Forgot Password Form (hidden by default) -->
      <div id="forgot-password-form" style="display:none;margin-top:var(--space-xl);">
        <h3 style="font-size:var(--fs-lg);margin-bottom:var(--space-md);">Reset Password</h3>
        <div class="form-group">
          <label class="form-label" for="reset-email">Email</label>
          <input type="email" id="reset-email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div id="reset-error" class="form-error" style="display:none;margin-bottom:var(--space-md);"></div>
        <button class="btn btn-primary btn-full" id="reset-btn">Send Reset Link</button>
        <button class="btn btn-ghost btn-full" id="reset-cancel-btn" style="margin-top:var(--space-sm);">Back to Login</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/deals.js"></script>
  <script src="js/components.js"></script>
  <script>
    (async function initLoginPage() {
      renderHeader('');

      // If already logged in, redirect
      const user = await getCurrentUser();
      if (user) {
        window.location.href = 'profile';
        return;
      }

      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const tabLogin = document.getElementById('tab-login');
      const tabSignup = document.getElementById('tab-signup');
      const forgotPasswordLink = document.getElementById('forgot-password-link');
      const forgotPasswordForm = document.getElementById('forgot-password-form');

      // Tab switching
      tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
        loginForm.style.display = '';
        signupForm.style.display = 'none';
        forgotPasswordForm.style.display = 'none';
      });

      tabSignup.addEventListener('click', () => {
        tabSignup.classList.add('active');
        tabLogin.classList.remove('active');
        signupForm.style.display = '';
        loginForm.style.display = 'none';
        forgotPasswordForm.style.display = 'none';
      });

      // Login
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');

        errorEl.style.display = 'none';

        if (!isValidEmail(email)) {
          errorEl.textContent = 'Please enter a valid email address';
          errorEl.style.display = '';
          return;
        }

        setButtonLoading(btn, true);
        const { user, error } = await signIn(email, password);
        setButtonLoading(btn, false);

        if (error) {
          errorEl.textContent = error;
          errorEl.style.display = '';
          return;
        }

        showToast('Welcome back!', 'success');
        setTimeout(() => { window.location.href = 'index'; }, 500);
      });

      // Signup
      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = sanitizeInput(document.getElementById('signup-name').value);
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const college = sanitizeInput(document.getElementById('signup-college').value);
        const city = sanitizeInput(document.getElementById('signup-city').value);
        const errorEl = document.getElementById('signup-error');
        const btn = document.getElementById('signup-btn');

        errorEl.style.display = 'none';

        if (!name) {
          errorEl.textContent = 'Please enter your name';
          errorEl.style.display = '';
          return;
        }

        if (!isValidEmail(email)) {
          errorEl.textContent = 'Please enter a valid email (no temporary email domains)';
          errorEl.style.display = '';
          return;
        }

        const pwCheck = validatePassword(password);
        if (!pwCheck.valid) {
          errorEl.textContent = pwCheck.message;
          errorEl.style.display = '';
          return;
        }

        setButtonLoading(btn, true);
        const { user, error } = await signUp(email, password, name, college, city);
        setButtonLoading(btn, false);

        if (error) {
          errorEl.textContent = error;
          errorEl.style.display = '';
          return;
        }

        showToast('Account created! Please check your email to verify.', 'success');
        setTimeout(() => { window.location.href = 'index'; }, 1500);
      });

      // Google OAuth
      document.getElementById('google-btn').addEventListener('click', signInWithGoogle);

      // Forgot Password
      forgotPasswordLink.addEventListener('click', (e) => {
        e.preventDefault();
        loginForm.style.display = 'none';
        forgotPasswordForm.style.display = '';
      });

      document.getElementById('reset-cancel-btn').addEventListener('click', () => {
        forgotPasswordForm.style.display = 'none';
        loginForm.style.display = '';
      });

      document.getElementById('reset-btn').addEventListener('click', async () => {
        const email = document.getElementById('reset-email').value.trim();
        const errorEl = document.getElementById('reset-error');

        if (!isValidEmail(email)) {
          errorEl.textContent = 'Please enter a valid email';
          errorEl.style.display = '';
          return;
        }

        const { error } = await resetPassword(email);
        if (error) {
          errorEl.textContent = error;
          errorEl.style.display = '';
          return;
        }

        showToast('Password reset link sent! Check your email.', 'success');
        forgotPasswordForm.style.display = 'none';
        loginForm.style.display = '';
      });
    })();
  </script>
</body>
</html>
