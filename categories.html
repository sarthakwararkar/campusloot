    <script src="js/deals.js"></script>
    <script>
      (async function initCategoriesPage() {
        // Initialize header/footer
        renderHeader('categories');
        renderFooter();

        const grid = document.getElementById("deals-grid");
        const loader = document.getElementById("deals-loader");
        const countEl = document.getElementById("deals-count");
        const loadMoreBtn = document.getElementById("load-more-btn");
        const navSearch = document.getElementById("nav-search-input");

        let currentPage = 1;
        let currentCategory = 'all';
        let currentSort = 'newest';
        let currentSearch = '';
        let totalDeals = 0;
        let dealsLoadedCount = 0;
        let user = await getCurrentUser();
        let savedSet = new Set();
        if (user) savedSet = await getSavedDealIds(user.id);

        async function loadDeals(page = 1, append = false) {
          if (!append) {
            grid.innerHTML = "";
            dealsLoadedCount = 0;
          }
          loader.classList.remove("hidden");
          if (loadMoreBtn) loadMoreBtn.disabled = true;

          const filters = {
            category: currentCategory,
            sort: currentSort,
            search: currentSearch,
            page: page
          };
          if (countEl) countEl.textContent = `Loading deals for page ${page}...`;
          const { deals, total } = await fetchDeals(filters);
          loader.classList.add("hidden");
          if (loadMoreBtn) loadMoreBtn.disabled = false;

          if (!deals) {
            if (!append) grid.innerHTML = '<p class="text-error col-span-full text-center py-8">Failed to load deals.</p>';
            return;
          }

          totalDeals = total;
          dealsLoadedCount += deals.length;
          currentPage = page;

          if (countEl) countEl.textContent = `Showing ${dealsLoadedCount} of ${totalDeals} deals`;

          if (deals.length === 0 && !append) {
            grid.innerHTML = '<p class="col-span-full text-center py-8 text-on-surface-variant">No deals found matching your criteria.</p>';
          } else {
            deals.forEach((deal) => {
              grid.appendChild(renderDealCard(deal, { savedDeals: savedSet }));
            });
          }

          updatePagination();
          updateLoadMoreVisibility();
        }

        function updatePagination() {
          renderPagination(
            'pagination-container',
            currentPage,
            totalDeals,
            12,
            (newPage) => {
              window.scrollTo({ top: 300, behavior: 'smooth' });
              loadDeals(newPage, false);
            }
          );
        }

        function updateLoadMoreVisibility() {
          if (!loadMoreBtn) return;
          if (dealsLoadedCount >= totalDeals) {
            loadMoreBtn.classList.add('hidden');
          } else {
            loadMoreBtn.classList.remove('hidden');
          }
        }

        if (loadMoreBtn) {
          loadMoreBtn.onclick = () => loadDeals(currentPage + 1, true);
        }

        // Sidebar Category Filters
        const categoryCheckboxes = document.querySelectorAll('aside input[type="checkbox"]');
        categoryCheckboxes.forEach((cb, idx) => {
          cb.onchange = () => {
            // Very simple mapping for the static sidebar in HTML
            const categories = ['Fashion & Lifestyle', 'Tech & Gadgets', 'Food & Dining', 'Travel & Stays'];
            if (cb.checked) {
              currentCategory = categories[idx] || 'all';
              // Uncheck others for simplicity (single selection)
              categoryCheckboxes.forEach(other => { if (other !== cb) other.checked = false; });
            } else {
              currentCategory = 'all';
            }
            loadDeals(1, false);
          };
        });

        // Brand Search In Sidebar
        const brandInput = document.querySelector('aside input[placeholder="e.g. Nike, Apple..."]');
        if (brandInput) {
           brandInput.oninput = debounce(() => {
             currentSearch = brandInput.value.trim();
             loadDeals(1, false);
           }, 500);
        }

        function debounce(func, timeout = 300) {
          let timer;
          return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
          };
        }

        // Initial Load
        const urlParams = new URLSearchParams(window.location.search);
        currentCategory = urlParams.get("category") || "all";
        currentSearch = urlParams.get("search") || "";
        loadDeals(1, false);

        // Header Search
        if (navSearch) {
          navSearch.onkeypress = (e) => {
            if (e.key === 'Enter') {
              currentSearch = navSearch.value.trim();
              loadDeals(1, false);
            }
          };
        }
      })();
    </script>
