    <main class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row gap-12">

            <div class="space-y-2">

              </label>

              </label>

                <span class="text-sm font-medium text-slate-400 group-hover:text-indigo-400 transition-colors">👕 Fashion</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input data-category="electronics" class="w-5 h-5 rounded border-white/10 bg-white/5 text-indigo-500 focus:ring-indigo-500/30 transition-all cursor-pointer" type="checkbox" />
                <span class="text-sm font-medium text-slate-400 group-hover:text-indigo-400 transition-colors">📱 Electronics</span>
              </label>
              <label class="flex items-center gap-3 cursor-pointer group">
                <input data-category="ott" class="w-5 h-5 rounded border-white/10 bg-white/5 text-indigo-500 focus:ring-indigo-500/30 transition-all cursor-pointer" type="checkbox" />
                <span class="text-sm font-medium text-slate-400 group-hover:text-indigo-400 transition-colors">🎬 Entertainment</span>
              </label>

      <!-- Deal Cards Grid -->
      <section class="flex-grow">
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">

            <span class="text-primary font-bold tracking-widest text-xs uppercase mb-2 block">Curated Just for You</span>

          </div>
          <div class="flex items-center gap-4 text-sm font-medium text-slate-400">
            <span id="deals-count">Showing 0 deals</span>
            <select class="bg-transparent border-none focus:ring-0 text-primary font-bold cursor-pointer">
              <option value="best-deals">Sort by: Best Deals</option>
              <option value="newest">Sort by: Newest</option>
              <option value="most-saved">Sort by: Popularity</option>
            </select>
          </div>
        </header>
        <div id="deals-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        <div id="deals-loader" class="hidden flex justify-center py-12 w-full">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
        </div>
        <!-- Pagination/Load More -->
        <div class="mt-20 flex flex-col items-center gap-6">
          <button id="load-more-btn" class="px-12 py-5 bg-white/10 text-white font-bold rounded-2xl shadow-xl hover:bg-white/20 hover:scale-105 active:scale-95 transition-all duration-300 border border-white/20 backdrop-blur-lg">Load More Deals</button>

        </div>

    <script>
      (async function initCategoriesPage() {
        renderHeader('categories');
        renderFooter();

        const grid = document.getElementById("deals-grid");
        const loader = document.getElementById("deals-loader");
        const countEl = document.getElementById("deals-count");
        const loadMoreBtn = document.getElementById("load-more-btn");
        const navSearch = document.getElementById("nav-search-input");
        const sortSelect = document.querySelector('select');

        let currentPage = 1;
        let currentCategory = 'all';
        let currentSort = 'best-deals';
        let currentSearch = '';
        let totalDeals = 0;
        let dealsLoadedCount = 0;
        let savedSet = new Set();
        getCurrentUser().then(async user => {
          if (user) {
            try { savedSet = await getSavedDealIds(user.id); } catch(e) { console.error(e); }
          }
        });

        async function loadDeals(page = 1, append = false) {
          try {
            if (!append) { grid.innerHTML = ""; dealsLoadedCount = 0; }
            if (loader) loader.classList.remove("hidden");
            if (loadMoreBtn) loadMoreBtn.disabled = true;

            const { deals, total } = await fetchDeals({
              category: currentCategory, sort: currentSort,
              search: currentSearch, page: page
            });
            if (loader) loader.classList.add("hidden");
            if (loadMoreBtn) loadMoreBtn.disabled = false;

            if (!deals) {
              if (!append) grid.innerHTML = '<p class="text-error col-span-full text-center py-8">Failed to load deals.</p>';
              return;
            }

            totalDeals = total;
            dealsLoadedCount += deals.length;
            currentPage = page;
            if (countEl) countEl.textContent = `Showing ${dealsLoadedCount} of ${totalDeals} deals`;

            if (deals.length === 0 && !append) {
              grid.innerHTML = '<p class="col-span-full text-center py-8 text-on-surface-variant">No deals found matching your criteria.</p>';
            } else {
              deals.forEach((deal) => grid.appendChild(renderDealCard(deal, { savedDeals: savedSet })));
            }
            updatePagination();
            updateLoadMoreVisibility();
          } catch (err) {
            console.error("loadDeals Error:", err);
            if (loader) loader.classList.add("hidden");
            if (!append) {
              grid.innerHTML = `<div class="col-span-full py-12 text-center text-error">
                <p class="font-bold">Something went wrong loading deals.</p>
                <p class="text-sm opacity-70">Please try refreshing the page.</p>
              </div>`;
            }
          }
        }

        function updatePagination() {
          renderPagination('pagination-container', currentPage, totalDeals, 12, (newPage) => {
            window.scrollTo({ top: 300, behavior: 'smooth' });
            loadDeals(newPage, false);
          });
        }

        function updateLoadMoreVisibility() {
          if (!loadMoreBtn) return;
          loadMoreBtn.classList.toggle('hidden', dealsLoadedCount >= totalDeals);
        }

        if (loadMoreBtn) loadMoreBtn.onclick = () => loadDeals(currentPage + 1, true);

        // Category filters using data-category
        const categoryCheckboxes = document.querySelectorAll('aside input[type="checkbox"][data-category]');
        categoryCheckboxes.forEach((cb) => {
          cb.onchange = () => {
            if (cb.checked) {
              currentCategory = cb.dataset.category || 'all';
              categoryCheckboxes.forEach(other => { if (other !== cb) other.checked = false; });
            } else {
              currentCategory = 'all';
              const allCb = document.querySelector('aside input[data-category="all"]');
              if (allCb) allCb.checked = true;
            }
            loadDeals(1, false);
          };
        });

        if (sortSelect) {
          sortSelect.onchange = () => { currentSort = sortSelect.value || 'best-deals'; loadDeals(1, false); };
        }

        const brandInput = document.querySelector('aside input[placeholder="e.g. Nike, Apple..."]');
        if (brandInput) {
           brandInput.oninput = debounce(() => { currentSearch = brandInput.value.trim(); loadDeals(1, false); }, 500);
        }

        function debounce(func, timeout = 300) {
          let timer;
          return (...args) => { clearTimeout(timer); timer = setTimeout(() => func.apply(this, args), timeout); };
        }

        // Initial Load
        const urlParams = new URLSearchParams(window.location.search);
        currentCategory = urlParams.get("category") || "all";
        currentSearch = urlParams.get("search") || "";

        // Pre-check the matching category checkbox
        if (currentCategory !== 'all') {
          const allCb = document.querySelector('aside input[data-category="all"]');
          const matchCb = document.querySelector(`aside input[data-category="${currentCategory}"]`);
          if (allCb) allCb.checked = false;
          if (matchCb) matchCb.checked = true;
        }

        loadDeals(1, false);

        if (navSearch) {
          navSearch.onkeypress = (e) => {
            if (e.key === 'Enter') { currentSearch = navSearch.value.trim(); loadDeals(1, false); }
          };
        }
      })();
    </script>
