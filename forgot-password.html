  <title>Forgot Password | CampusLoot</title>

  <meta name="description" content="Exclusive student deals and discounts on forgot-password at CampusLoot." />
  <meta property="og:title" content="Forgot Password | CampusLoot" />
  <meta property="og:description" content="Exclusive student deals and discounts on forgot-password at CampusLoot." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://campusloot.com/forgot-password.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Forgot Password | CampusLoot" />
  <meta name="twitter:description" content="Exclusive student deals and discounts on forgot-password at CampusLoot." />
  <meta name="twitter:image" content="/og-image.png" />
  <link rel="icon" href="/favicon.ico" />

</head>
  <body class="bg-black min-h-screen flex items-center justify-center p-6 text-white overflow-hidden">
    <div class="bg-white/12 backdrop-blur-2xl max-w-md w-full p-10 rounded-[2.5rem] border border-white/20 shadow-2xl space-y-8 relative z-10">
        <div class="space-y-3 text-center">
            <h1 class="text-3xl font-bold text-white">Check your inbox</h1>
            <p class="text-slate-400 leading-relaxed">
                Enter your university email and we'll send you a link to reset your password.
            </p>
        </div>

        <form id="forgot-password-form" class="space-y-6">
            <div class="space-y-2">
                <label class="block font-label text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="reset-email">University Email</label>
                <input class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-5 text-white placeholder:text-slate-600 focus:ring-2 focus:ring-indigo-500/50 transition-all outline-none" id="reset-email" placeholder="name@university.edu.in" type="email" required />
            </div>
            
            <div id="status-message" class="hidden p-4 rounded-2xl text-sm font-medium text-center"></div>

            <button id="reset-btn" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-body font-bold py-4 rounded-full shadow-[0_10px_30px_rgba(74,64,224,0.2)] hover:shadow-[0_15px_35px_rgba(74,64,224,0.3)] hover:-translate-y-0.5 transition-all active:scale-95 duration-200" type="submit">
                Send Reset Link
            </button>
        </form>

        <div class="pt-4 text-center">
            <a href="login.html" class="text-sm font-bold text-indigo-400 hover:text-indigo-300 hover:underline decoration-indigo-400/30 underline-offset-4">
                Back to Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/star-background.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('forgot-password-form');
        const statusMsg = document.getElementById('status-message');
        const btn = document.getElementById('reset-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value.trim();
            if (!email) return;

            btn.disabled = true;
            btn.textContent = 'Sending...';
            statusMsg.classList.add('hidden');

            try {
                const { error } = await resetPassword(email);
                if (error) {
                    statusMsg.textContent = error;
                    statusMsg.className = 'p-4 rounded-2xl text-sm font-medium text-center bg-error/10 text-error';
                    statusMsg.classList.remove('hidden');
                } else {
                    statusMsg.textContent = 'Done! Check your email for the reset link.';
                    statusMsg.className = 'p-4 rounded-2xl text-sm font-medium text-center bg-tertiary/10 text-tertiary';
                    statusMsg.classList.remove('hidden');
                    form.reset();
                }
            } catch (err) {
                console.error(err);
                statusMsg.textContent = 'Something went wrong. Try again later.';
                statusMsg.className = 'p-4 rounded-2xl text-sm font-medium text-center bg-error/10 text-error';
                statusMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>

  <!-- Cookie Consent Banner -->
  <script>
    (function() {
      if (!localStorage.getItem('cookieConsent')) {
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#fff;padding:15px;text-align:center;font-family:sans-serif;z-index:9999;display:flex;justify-content:center;align-items:center;gap:15px;flex-wrap:wrap;border-top:1px solid #333;box-shadow:0 -5px 15px rgba(0,0,0,0.2);';
        banner.innerHTML = '<span style="font-size:14px;">We use cookies to improve your experience. See our <a href="privacy.html" style="color:#4a40e0;text-decoration:underline;">Privacy Policy</a>.</span> ' +
          '<div style="display:flex;gap:10px;"><button id="acceptCookies" style="background:#4a40e0;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:14px;">Accept</button> ' +
          '<button id="declineCookies" style="background:transparent;color:#ccc;border:1px solid #ccc;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px;">Decline</button></div>';
        document.body.appendChild(banner);
        document.getElementById('acceptCookies').onclick = function() {
          localStorage.setItem('cookieConsent', 'accepted');
          banner.style.display = 'none';
        };
        document.getElementById('declineCookies').onclick = function() {
          localStorage.setItem('cookieConsent', 'declined');
          banner.style.display = 'none';
        };
      }
    })();
  </script>

    <script src="js/star-background.js"></script>
</body>
</html>
