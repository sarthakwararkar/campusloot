<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | CampusLoot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-md w-full p-10 rounded-[2.5rem] shadow-2xl space-y-8">
        <div class="space-y-3 text-center">
            <h1 class="text-3xl font-bold text-on-surface">Forgot Password?</h1>
            <p class="text-on-surface-variant leading-relaxed">
                Enter your university email and we'll send you a link to reset your password.
            </p>
        </div>

        <form id="forgot-password-form" class="space-y-6">
            <div class="space-y-2">
                <label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="reset-email">University Email</label>
                <input class="w-full bg-surface-container-highest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="reset-email" placeholder="name@university.edu.in" type="email" required />
            </div>
            
            <div id="status-message" class="hidden p-4 rounded-2xl text-sm font-medium text-center"></div>

            <button id="reset-btn" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-body font-bold py-4 rounded-full shadow-[0_10px_30px_rgba(74,64,224,0.2)] hover:shadow-[0_15px_35px_rgba(74,64,224,0.3)] hover:-translate-y-0.5 transition-all active:scale-95 duration-200" type="submit">
                Send Reset Link
            </button>
        </form>

        <div class="pt-4 text-center">
            <a href="login.html" class="text-sm font-bold text-primary hover:underline decoration-primary/30 underline-offset-4">
                Back to Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('forgot-password-form');
        const statusMsg = document.getElementById('status-message');
        const btn = document.getElementById('reset-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value.trim();
            if (!email) return;

            btn.disabled = true;
            btn.textContent = 'Sending...';
            statusMsg.classList.add('hidden');

            try {
                const { error } = await resetPassword(email);
                if (error) {
                    statusMsg.textContent = error;
                    statusMsg.className = 'p-4 rounded-2xl text-sm font-medium text-center bg-error/10 text-error';
                    statusMsg.classList.remove('hidden');
                } else {
                    statusMsg.textContent = 'Done! Check your email for the reset link.';
                    statusMsg.className = 'p-4 rounded-2xl text-sm font-medium text-center bg-tertiary/10 text-tertiary';
                    statusMsg.classList.remove('hidden');
                    form.reset();
                }
            } catch (err) {
                console.error(err);
                statusMsg.textContent = 'Something went wrong. Try again later.';
                statusMsg.className = 'p-4 rounded-2xl text-sm font-medium text-center bg-error/10 text-error';
                statusMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
